<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HamroBot</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-900 flex items-center justify-center h-screen">

  <div class="w-full max-w-2xl h-[600px] bg-gray-800 rounded-xl shadow-lg flex flex-col">
    <div class="bg-gray-700 text-white p-4 rounded-t-xl flex items-center gap-2">
      <div class="w-3 h-3 bg-green-400 rounded-full"></div>
      <h1 class="font-semibold">HamroBot</h1>
    </div>

    <div id="chat" class="flex-1 p-4 overflow-y-auto space-y-4">

      <div class="flex">
        <div class="bg-gray-700 text-white p-3 rounded-lg max-w-xs">
          Hello! How can I help you today?
        </div>
      </div>

      <div class="flex justify-end">
        <div class="bg-blue-500 text-white p-3 rounded-lg max-w-xs">
        </div>
      </div>

    </div>

    <div class="p-4 border-t border-gray-700 flex gap-2">

      <input 
        id="messageInput"
        type="text"
        placeholder="Type your message..."
        class="flex-1 bg-gray-700 text-white px-4 py-2 rounded-lg outline-none"
      />

      <button 
        id="sendBtn"
        class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">
        Send
      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
